<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benn Stancil - Intellectual Footprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>Benn Stancil</h1>
                <span class="subtitle">Intellectual Footprint</span>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-view="timeline">Timeline</button>
                <button class="nav-btn" data-view="quotes">Quotes</button>
                <button class="nav-btn" data-view="themes">Themes</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="controls">
            <div class="search-container">
                <input type="text" id="search" placeholder="Search posts, quotes, insights..." class="search-input">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
            <div class="theme-filters" id="theme-filters"></div>
        </div>

        <div class="stats-bar" id="stats-bar">
            <span class="stat"><strong id="post-count">240</strong> posts</span>
            <span class="stat"><strong id="quote-count">1185</strong> quotes</span>
            <span class="stat"><strong id="year-range">2021-2026</strong></span>
        </div>

        <!-- Timeline View -->
        <section class="view timeline-view active" id="timeline-view">
            <div class="timeline" id="timeline"></div>
        </section>

        <!-- Quotes View -->
        <section class="view quotes-view" id="quotes-view">
            <div class="quotes-grid" id="quotes-grid"></div>
        </section>

        <!-- Themes View -->
        <section class="view themes-view" id="themes-view">
            <div class="themes-overview" id="themes-overview"></div>
        </section>
    </main>

    <!-- Post Detail Modal -->
    <div class="modal" id="post-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <footer class="footer">
        <p>Analyzing <span id="footer-posts">240</span> posts from <a href="https://benn.substack.com" target="_blank">benn.substack.com</a></p>
        <p class="footer-note">Built with LLM-powered analysis</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
